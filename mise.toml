[tools]
"gh" = "2.95.0"
"uv" = "0.11.26"

[tasks.install-skills]
description = "Installs all skills (local + third-party) to .agents/skills via the skills.sh CLI"
run = [
  "npx -y skills add https://github.com/vercel-labs/skills --skill find-skills --dir .agents/skills -y",
  "npx -y skills add https://github.com/mattpocock/skills --skill tdd --skill triage --skill handoff --dir .agents/skills -y",
]

[tasks.install-serena]
description = "Installs the Serena MCP server via uv tool install"
run = """
uv tool install -p 3.13 serena-agent
serena --version
"""
